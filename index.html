<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Semantic Image Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --surface-2: #f1efea;
      --border: rgba(0,0,0,0.12);
      --border-hover: rgba(0,0,0,0.25);
      --text: #1a1a18;
      --text-muted: #6b6a66;
      --text-faint: #9b9a96;
      --accent: #1D9E75;
      --accent-light: #E1F5EE;
      --accent-text: #085041;
      --info-bg: #E6F1FB;
      --info-text: #0C447C;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --surface: #262624;
        --surface-2: #2e2e2c;
        --border: rgba(255,255,255,0.1);
        --border-hover: rgba(255,255,255,0.22);
        --text: #f0ede6;
        --text-muted: #a0a09a;
        --text-faint: #6a6a64;
        --accent: #5DCAA5;
        --accent-light: #04342C;
        --accent-text: #9FE1CB;
        --info-bg: #042C53;
        --info-text: #B5D4F4;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .brand svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      stroke: var(--text-faint);
      fill: none;
      pointer-events: none;
    }

    #search-input {
      width: 100%;
      padding: 8px 12px 8px 34px;
      font-size: 14px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface-2);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    #search-input:focus { border-color: var(--border-hover); }
    #search-input::placeholder { color: var(--text-faint); }

    #status-pill {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 99px;
      background: var(--surface-2);
      color: var(--text-muted);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: background 0.2s, color 0.2s;
    }

    #status-pill.loading { background: var(--info-bg); color: var(--info-text); }
    #status-pill.done   { background: var(--accent-light); color: var(--accent-text); }

    #status-pill svg { width: 12px; height: 12px; stroke: currentColor; fill: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 0.9s linear infinite; }

    /* ── Toolbar ── */
    .toolbar {
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    #limit-select {
      font-size: 12px;
      padding: 4px 8px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      cursor: pointer;
    }

    #result-count { font-size: 12px; color: var(--text-faint); margin-left: auto; }

    /* ── Grid ── */
    .grid-area { padding: 0 1.5rem 2rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }

    .card:hover { border-color: var(--border-hover); transform: translateY(-1px); }

    .card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: var(--surface-2);
    }

    .card-placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-placeholder svg { width: 28px; height: 28px; stroke: var(--text-faint); fill: none; }

    .card-info { padding: 8px 10px 10px; }
    .card-name { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-score { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

    .score-bar-bg { height: 2px; background: var(--border); border-radius: 2px; margin-top: 5px; }
    .score-bar { height: 2px; background: var(--accent); border-radius: 2px; }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-faint);
      font-size: 14px;
    }

    .empty svg {
      width: 36px; height: 36px;
      stroke: var(--text-faint);
      fill: none;
      display: block;
      margin: 0 auto 10px;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    #lightbox.open { display: flex; }

    .lightbox-inner {
      background: var(--surface);
      border-radius: var(--radius-lg);
      overflow: hidden;
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    .lightbox-img-wrap {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-img-wrap img { max-width: 100%; max-height: 60vh; object-fit: contain; display: block; }

    .lightbox-meta {
      padding: 1rem 1.25rem;
      border-top: 0.5px solid var(--border);
    }

    .lightbox-filename { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .lightbox-path { font-size: 11px; color: var(--text-faint); word-break: break-all; }
    .lightbox-score { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

    .lightbox-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 50%;
      width: 32px; height: 32px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text);
    }

    .lightbox-close svg { width: 16px; height: 16px; stroke: currentColor; fill: none; }
  </style>
</head>
<body>

<header class="header">
  <div class="brand">
    <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="m21 15-5-5L5 21"/>
    </svg>
    Image Search
  </div>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search-input" type="text" placeholder="Describe an image… e.g. 'dog running on grass'" autocomplete="off" />
  </div>

  <div id="status-pill">
    <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" id="pill-icon">
      <circle cx="12" cy="12" r="4"/>
    </svg>
    <span id="pill-label">ready</span>
  </div>
</header>

<div class="toolbar">
  <label for="limit-select">Results</label>
  <select id="limit-select">
    <option value="12">12</option>
    <option value="24" selected>24</option>
    <option value="48">48</option>
    <option value="96">96</option>
  </select>
  <span id="result-count"></span>
</div>

<div class="grid-area">
  <div id="grid" class="grid">
    <div class="empty">
      <svg viewBox="0 0 24 24" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
      Start typing to search your image library
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <div class="lightbox-inner">
    <div class="lightbox-img-wrap">
      <img id="lb-img" src="" alt="" />
    </div>
    <div class="lightbox-meta">
      <div class="lightbox-filename" id="lb-name"></div>
      <div class="lightbox-path" id="lb-path"></div>
      <div class="lightbox-score" id="lb-score"></div>
    </div>
  </div>
  <button class="lightbox-close" id="lb-close" aria-label="Close">
    <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
  </button>
</div>

<script>
const API_BASE = "http://127.0.0.1:8000";
const DEBOUNCE_MS = 350;

const input     = document.getElementById("search-input");
const grid      = document.getElementById("grid");
const pill      = document.getElementById("status-pill");
const pillIcon  = document.getElementById("pill-icon");
const pillLabel = document.getElementById("pill-label");
const countEl   = document.getElementById("result-count");
const limitSel  = document.getElementById("limit-select");
const lightbox  = document.getElementById("lightbox");

let debounceTimer = null;
let activeQuery   = "";

// ── SVG icon snippets ──
const ICON_READY   = '<circle cx="12" cy="12" r="4"/>';
const ICON_LOADING = '<path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>';
const ICON_DONE    = '<path d="M20 6 9 17l-5-5"/>';
const ICON_ERROR   = '<circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>';

function setPill(state) {
  pill.className = state === "loading" ? "loading" : state === "done" ? "done" : "";
  if (state === "loading") {
    pillIcon.innerHTML = ICON_LOADING;
    pillIcon.classList.add("spinning");
    pillLabel.textContent = "searching";
  } else if (state === "done") {
    pillIcon.innerHTML = ICON_DONE;
    pillIcon.classList.remove("spinning");
    pillLabel.textContent = "done";
  } else if (state === "error") {
    pillIcon.innerHTML = ICON_ERROR;
    pillIcon.classList.remove("spinning");
    pillLabel.textContent = "error";
  } else {
    pillIcon.innerHTML = ICON_READY;
    pillIcon.classList.remove("spinning");
    pillLabel.textContent = "ready";
  }
}

function renderEmpty(msg) {
  countEl.textContent = "";
  grid.innerHTML = `<div class="empty">
    <svg viewBox="0 0 24 24" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <path d="M8.5 8.5h.01M21 15l-5-5L5 21"/>
    </svg>
    ${msg}
  </div>`;
}

function thumbUrl(meta) {
  const filename = (meta.thumbnail_path || "").split(/[/\\]/).pop();
  return filename ? `${API_BASE}/thumbnails/${encodeURIComponent(filename)}` : null;
}

function renderResults(results, query) {
  if (!results.length) {
    renderEmpty(`No matches for "<em>${query}</em>"`);
    countEl.textContent = "0 results";
    return;
  }

  countEl.textContent = `${results.length} result${results.length !== 1 ? "s" : ""}`;
  grid.innerHTML = "";

  for (const r of results) {
    const card = document.createElement("div");
    card.className = "card";

    const url   = thumbUrl(r.metadata);
    const score = Math.round(r.score * 100);

    card.innerHTML = url
      ? `<img src="${url}" alt="${r.metadata.filename}" loading="lazy" />`
      : `<div class="card-placeholder"><svg viewBox="0 0 24 24" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`;

    card.innerHTML += `
      <div class="card-info">
        <div class="card-name" title="${r.metadata.filename}">${r.metadata.filename}</div>
        <div class="card-score">${score}% match</div>
        <div class="score-bar-bg"><div class="score-bar" style="width:${score}%"></div></div>
      </div>`;

    card.addEventListener("click", () => openLightbox(r, url));
    grid.appendChild(card);
  }
}

// ── Lightbox ──
function openLightbox(r, url) {
  document.getElementById("lb-img").src  = url || "";
  document.getElementById("lb-name").textContent  = r.metadata.filename;
  document.getElementById("lb-path").textContent  = r.metadata.full_path || r.id;
  document.getElementById("lb-score").textContent = `Similarity: ${Math.round(r.score * 100)}%`;
  lightbox.classList.add("open");
}

document.getElementById("lb-close").addEventListener("click", () => lightbox.classList.remove("open"));
lightbox.addEventListener("click", e => { if (e.target === lightbox) lightbox.classList.remove("open"); });
document.addEventListener("keydown", e => { if (e.key === "Escape") lightbox.classList.remove("open"); });

// ── Search ──
async function doSearch(query) {
  const limit = parseInt(limitSel.value, 10);

  if (!query.trim()) {
    renderEmpty("Start typing to search your image library");
    setPill("idle");
    countEl.textContent = "";
    return;
  }

  setPill("loading");

  try {
    const url = `${API_BASE}/search?q=${encodeURIComponent(query)}&limit=${limit}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (query !== activeQuery) return; // stale response
    renderResults(data.results || [], query);
    setPill("done");
  } catch (err) {
    if (query !== activeQuery) return;
    renderEmpty(`Could not reach the API — is <code>api.py</code> running on port 8000?`);
    setPill("error");
    countEl.textContent = "";
  }
}

input.addEventListener("input", () => {
  clearTimeout(debounceTimer);
  activeQuery = input.value;
  debounceTimer = setTimeout(() => doSearch(activeQuery), DEBOUNCE_MS);
});

limitSel.addEventListener("change", () => {
  if (activeQuery.trim()) doSearch(activeQuery);
});

input.focus();
</script>
</body>
</html>
